name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (macOS) + iOS build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Run tests (macOS) with coverage
        run: swift test --enable-code-coverage

      - name: Export coverage (lcov)
        run: |
          BIN=$(find .build -path '*data-integrity-iosPackageTests.xctest/Contents/MacOS/*' -type f | head -1)
          PROF=$(find .build -name 'default.profdata' | head -1)
          echo "binary=$BIN"
          echo "profdata=$PROF"
          if [ -z "$BIN" ] || [ -z "$PROF" ]; then echo "::error::coverage inputs not found"; exit 1; fi
          xcrun llvm-cov export -format=lcov "$BIN" -instr-profile "$PROF" \
            -ignore-filename-regex='(\.build|/Tests/|/Vendor/)' > coverage.lcov
          # llvm-cov emits absolute SF: paths; make them repo-relative so Codecov
          # can map them to files in the repository.
          sed -i '' "s#${PWD}/##g" coverage.lcov
          echo "lcov bytes: $(wc -c < coverage.lcov)"
          grep -m1 '^SF:' coverage.lcov || echo "::warning::no SF entries in coverage.lcov"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.lcov
          fail_ci_if_error: false
          verbose: true

      - name: Build for iOS
        run: xcodebuild -scheme data-integrity-ios -destination 'generic/platform=iOS' build
