name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (macOS) + iOS build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Run tests (macOS) with coverage
        run: swift test --enable-code-coverage

      - name: Export coverage (lcov)
        run: |
          BIN=$(find .build -path '*data-integrity-iosPackageTests.xctest/Contents/MacOS/*' -type f | head -1)
          PROF=$(find .build -name 'default.profdata' | head -1)
          echo "binary=$BIN"
          echo "profdata=$PROF"
          if [ -z "$BIN" ] || [ -z "$PROF" ]; then echo "::error::coverage inputs not found"; exit 1; fi
          xcrun llvm-cov export -format=lcov "$BIN" -instr-profile "$PROF" \
            -ignore-filename-regex='(\.build|/Tests/|/Vendor/)' > coverage.lcov
          # llvm-cov emits ABSOLUTE SF: paths. Rewrite everything up to and
          # including ".../Sources/" -> "Sources/" so the paths are repo-relative
          # regardless of the runner's workspace prefix (symlinks etc.). Codecov
          # needs repo-relative paths to map files; otherwise it shows nothing.
          sed -i '' -E 's#^SF:.*/Sources/#SF:Sources/#' coverage.lcov
          echo "lcov bytes: $(wc -c < coverage.lcov)"
          echo "--- sample SF entries (should start with Sources/) ---"
          grep '^SF:' coverage.lcov | head -3 || echo "::warning::no SF entries in coverage.lcov"

      - name: Upload coverage.lcov as artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.lcov
          fail_ci_if_error: false
          verbose: true

      - name: Build for iOS
        run: xcodebuild -scheme data-integrity-ios -destination 'generic/platform=iOS' build
