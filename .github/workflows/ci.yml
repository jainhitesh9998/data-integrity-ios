name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (macOS) + iOS build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Swift toolchain
        run: swift --version
      - name: Run tests (macOS)
        run: swift test
      - name: Build for iOS
        run: xcodebuild -scheme data-integrity-ios -destination 'generic/platform=iOS' build
