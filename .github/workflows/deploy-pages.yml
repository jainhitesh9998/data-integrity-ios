name: Deploy DID document to GitHub Pages

# Publishes the `docs/` directory (which contains the did:web DID document
# `did.json`) to GitHub Pages, served at:
#   https://jainhitesh9998.github.io/data-integrity-ios/did.json
# i.e. the resolution target for did:web:jainhitesh9998.github.io:data-integrity-ios
#
# `configure-pages` with `enablement: true` turns GitHub Pages on automatically
# (build type = GitHub Actions) on the first run, so no manual Settings change
# is needed.

on:
  push:
    branches: [main]
    # Only redeploy when the published content (or this workflow) changes —
    # avoids a Pages deploy (and deployment races) on every unrelated commit.
    paths:
      - "docs/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; cancel a superseded in-progress run so a
# newer commit doesn't collide with an older deploy ("in progress deployment").
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
